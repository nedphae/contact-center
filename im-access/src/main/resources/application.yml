server:
  port: 9090

spring:
  application:
    name: im-server
  netty-websocket:
    name: websocket-server
    port: 8090
    service-id: ${spring.netty-websocket.name}:${vcap.application.instance_id:${spring.application.instance_id:${spring.netty-websocket.port}}}

  redis:
    database: 0
    host: 192.168.50.101
    port: 6379
    password: UWLCcn&w#J0&REq.
    timeout: 5000

  r2dbc:
    url: r2dbc:postgresql://192.168.50.103:5432/postgres?currentSchema=im
    username: postgres
    password: UBhLbJ3yIZ
    pool:
      enabled: true

  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         jwk-set-uri: http://localhost:8000/.well-known/jwks.json

  kafka:
    client-id: im.01
  cloud:
    inetutils:
      ignored-interfaces:
        - eth*
      preferred-networks:
        - 192.168.*
    consul:
      host: 192.168.50.102
      port: 8500
      discovery:
        prefer-ip-address: true
        instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${server.port}}}
        # health-check-url: http://${spring.cloud.client.ip-address}:${server.port}/actuator/health
    loadbalancer:
      ribbon:
        enabled: false

    stream:
      function:
        definition: message;messageStreamProcess
      poller:
        fixed-delay: 500
        max-messages-per-poll: 1
      kafka:
        binder:
          brokers: 192.168.50.105:9092
          replication-factor: 1
        streams:
          binder:
            functions:
              message:
                applicationId: message
              messageStreamProcess:
                applicationId: messageStreamProcess
      bindings:
        message-out-0:
          destination: ${spring.kafka.client-id:im}.message
        messageStreamProcess-in-0:
          destination: ${spring.kafka.client-id:im}.message

  security:
    oauth2:
      client:
        provider:
          authProvider:
            token-uri: http://oauth2-auth-server/oauth/token
        registration:
          authProvider:
            client-id: inner_client
            client-secret: test_secret
            authorization-grant-type: client_credentials

logging:
  level:
    root: info